<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#070709">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'">
    <title>Page not found — Redline</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { min-width: 300px; min-height: 100vh; margin: 0; color: #f8fafc; background: radial-gradient(circle at 85% 8%, rgb(153 27 27 / 24%), transparent 28rem), #070709; }
      a { color: inherit; }
      :focus-visible { outline: 3px solid rgb(248 113 113 / 80%); outline-offset: 3px; }
      .header { min-height: 78px; border-bottom: 1px solid #2d2d33; }
      .bar { display: flex; width: min(calc(100% - 40px), 1180px); min-height: 78px; margin: auto; align-items: center; justify-content: space-between; }
      .brand { display: inline-flex; align-items: center; gap: 11px; font-weight: 850; text-decoration: none; }
      .mark { display: grid; width: 37px; height: 37px; place-items: center; color: #ef4444; background: #040406; border: 1px solid #2d2d33; border-radius: 50%; font-size: 1.25rem; text-decoration: underline; text-underline-offset: 4px; }
      nav { display: flex; gap: 16px; }
      nav a { color: #b8b8c0; font-size: .85rem; font-weight: 750; text-decoration: none; }
      main { display: grid; min-height: calc(100vh - 79px); place-items: center; padding: 4rem 20px; text-align: center; }
      .code { display: block; color: #ef4444; font-family: Consolas, monospace; font-size: .78rem; font-weight: 850; letter-spacing: .16em; }
      h1 { margin: .8rem 0 1rem; font-size: clamp(2.8rem, 8vw, 6rem); line-height: 1; letter-spacing: -.045em; }
      p { max-width: 560px; margin: 0 auto 1.8rem; color: #b8b8c0; line-height: 1.65; }
      .actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
      .button { display: inline-flex; min-height: 46px; align-items: center; justify-content: center; padding: .7rem 1rem; background: #18181c; border: 1px solid #3c3c44; border-radius: 10px; font-size: .9rem; font-weight: 800; text-decoration: none; }
      .button.primary { background: linear-gradient(180deg, #ef4444, #b91c1c); border-color: #ef4444; }
      @media (max-width: 520px) { .bar { width: min(calc(100% - 28px), 1180px); } .actions .button { width: 100%; } }
    </style>
  </head>
  <body>
    <header class="header"><div class="bar"><a class="brand" href="/" data-route=""><span class="mark" aria-hidden="true">R</span><span>Redline</span></a><nav aria-label="Primary"><a href="/" data-route="docs/index.html">Docs</a><a href="/" data-route="support.html">Support</a></nav></div></header>
    <main><div><span class="code">ERROR 404</span><h1>That trail goes cold.</h1><p>The page may have moved, or the address may be incomplete. Return to the homepage or continue through the documentation.</p><div class="actions"><a class="button primary" href="/" data-route="">Return home</a><a class="button" href="/" data-route="docs/index.html">Browse docs</a></div></div></main>
    <script>
      const pathParts = window.location.pathname.split("/").filter(Boolean);
      const projectBase = window.location.hostname.endsWith(".github.io") && pathParts.length ? `/${pathParts[0]}/` : "/";
      document.querySelectorAll("[data-route]").forEach((link) => { link.href = projectBase + link.dataset.route; });
    </script>
  </body>
</html>
